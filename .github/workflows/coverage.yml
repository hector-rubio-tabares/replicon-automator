name: Test Coverage Report

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'test/**'
  workflow_dispatch:

# Cancelar ejecuciones duplicadas
concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22.14.0'

jobs:
  coverage:
    name: Generate Coverage Report
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      # Reusar caché de node_modules
      - name: Cache node modules
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: node_modules
          key: ${{ runner.os }}-node-v1-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-v1-
      
      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci
      
      - name: Run tests with coverage
        run: npm run test:coverage
        continue-on-error: true  # No fallar si no alcanza umbrales
      
      - name: Generate coverage badge
        if: always()
        run: |
          # Verificar que existe el archivo de coverage
          if [ ! -f "coverage/coverage-final.json" ]; then
            echo "No coverage file found, using 0%"
            COVERAGE="0"
          else
            # Extraer porcentaje de cobertura de líneas de forma segura
            COVERAGE=$(cat coverage/coverage-final.json | jq -r '.total.lines.pct // 0' 2>/dev/null || echo "0")
          fi
          
          # Determinar color usando awk
          if [ $(echo "$COVERAGE < 50" | awk '{print ($1 < $3)}') -eq 1 ]; then
            COLOR="red"
          elif [ $(echo "$COVERAGE < 80" | awk '{print ($1 < $3)}') -eq 1 ]; then
            COLOR="yellow"
          else
            COLOR="brightgreen"
          fi
          
          echo "Coverage: ${COVERAGE}% - Color: ${COLOR}"
          
          mkdir -p .github/badges
          curl -s "https://img.shields.io/badge/coverage-${COVERAGE}%25-${COLOR}" > .github/badges/coverage.svg
      
      # Subir coverage solo para deploy, con retención mínima
      - name: Upload coverage report
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 3  # Solo 3 días de retención
      
      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            try {
              // Verificar que el archivo existe
              if (!fs.existsSync('coverage/coverage-final.json')) {
                console.log('No coverage file found, skipping comment');
                return;
              }
              
              const coverage = JSON.parse(fs.readFileSync('coverage/coverage-final.json', 'utf8'));
              
              // Verificar que total existe
              if (!coverage || !coverage.total) {
                console.log('No coverage.total found, skipping comment');
                return;
              }
              
              const total = coverage.total;
              
              // Función helper para obtener porcentaje seguro
              const getPct = (metric) => metric?.pct ?? 0;
              
              const body = `## 📊 Test Coverage Report
              
              | Metric | Coverage | Status |
              |--------|----------|--------|
              | Lines | ${getPct(total.lines)}% | ${getPct(total.lines) >= 80 ? '✅' : '⚠️'} |
              | Statements | ${getPct(total.statements)}% | ${getPct(total.statements) >= 80 ? '✅' : '⚠️'} |
              | Functions | ${getPct(total.functions)}% | ${getPct(total.functions) >= 80 ? '✅' : '⚠️'} |
              | Branches | ${getPct(total.branches)}% | ${getPct(total.branches) >= 80 ? '✅' : '⚠️'} |
              `;
              
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } catch (error) {
              console.log('Error creating coverage comment:', error.message);
              // No fallar el workflow si no se puede crear el comentario
            }
