name: CI/CD Pipeline

on:
  push:
    tags: ['v*']        # Solo en tags de release
  pull_request:
    branches: [main]    # Solo PRs a main
  workflow_dispatch:    # Ejecución manual

# Cancelar builds duplicados
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22.14.0'

jobs:
  build:
    name: Build & Quality Check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" =~ refs/tags/v(.+) ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
      
      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Extract section for this version
          awk -v ver="$VERSION" '/^## \[/{if(p){exit}; if($0 ~ "## \\[" ver "\\]"){p=1; next}} p' CHANGELOG.md > release_notes.txt
          
          if [ ! -s release_notes.txt ]; then
            echo "Release v$VERSION" > release_notes.txt
          fi
          
          echo "Release notes extracted:"
          cat release_notes.txt
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      # Playwright ya viene en node_modules desde npm ci
      # No necesitamos instalar browsers porque solo empaquetamos (no ejecutamos)
      
      - name: Prepare Playwright for build
        run: npm run prepare-playwright
      
      - name: Run quality checks
        run: npm run validate
      
      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
      
      - name: Debug - List dist folder contents
        run: |
          echo "=== Contents of dist/ ==="
          ls -lah dist/ || echo "dist/ does not exist"
          echo ""
          echo "=== Contents of dist/main/ ==="
          ls -lah dist/main/ || echo "dist/main/ does not exist"
          echo ""
          echo "=== Checking if dist/main/index.js exists ==="
          if [ -f "dist/main/index.js" ]; then
            echo "✅ dist/main/index.js EXISTS"
            file dist/main/index.js
          else
            echo "❌ dist/main/index.js DOES NOT EXIST"
            echo "Looking for index.* in dist/main/:"
            find dist/main -name "index.*" -type f 2>/dev/null || echo "No index.* files found"
          fi
      
      - name: Verify Playwright before packaging
        run: |
          echo "✅ Verificando que Playwright esté en node_modules..."
          if [ -d "node_modules/playwright" ]; then
            echo "✅ Playwright encontrado"
            ls -la node_modules/playwright/ | head -20
          else
            echo "❌ ERROR: Playwright no está en node_modules"
            exit 1
          fi
      
      - name: Package application (Windows)
        run: npx electron-forge make --platform=win32
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: |
            out/make/zip/win32/x64/*.zip
            release_notes.txt
          retention-days: 1  # Eliminar después de 1 día para $0 storage

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-portable
      
      - name: List downloaded files
        run: |
          echo "=== Downloaded files ==="
          ls -lah
          find . -type f
      
      - name: Read release notes
        id: notes
        run: |
          if [ -f release_notes.txt ]; then
            {
              echo 'notes<<EOF'
              cat release_notes.txt
              echo EOF
            } >> $GITHUB_OUTPUT
          else
            echo "notes=Release v${{ needs.build.outputs.version }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Replicon Automator v${{ needs.build.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: false
          files: |
            *.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
