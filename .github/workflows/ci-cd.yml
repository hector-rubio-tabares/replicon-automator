name: CI/CD Pipeline

on:
  push:
    tags: ['v*']        # Solo en tags de release
  pull_request:
    branches: [main]    # Solo PRs a main
  workflow_dispatch:    # Ejecución manual

# Cancelar builds duplicados
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22.14.0'

jobs:
  build:
    name: Build & Quality Check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" =~ refs/tags/v(.+) ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
      
      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Extract section for this version
          awk -v ver="$VERSION" '/^## \[/{if(p){exit}; if($0 ~ "## \\[" ver "\\]"){p=1; next}} p' CHANGELOG.md > release_notes.txt
          
          if [ ! -s release_notes.txt ]; then
            echo "Release v$VERSION" > release_notes.txt
          fi
          
          echo "Release notes extracted:"
          cat release_notes.txt
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install Wine (required for packaging Windows on Linux)
        run: |
          sudo dpkg --add-architecture i386
          sudo mkdir -pm755 /etc/apt/keyrings
          sudo wget -O /etc/apt/keyrings/winehq-archive.key https://dl.winehq.org/wine-builds/winehq.key
          sudo wget -NP /etc/apt/sources.list.d/ https://dl.winehq.org/wine-builds/ubuntu/dists/jammy/winehq-jammy.sources
          sudo apt-get update
          sudo apt-get install -y --install-recommends winehq-stable
      
      - name: Install dependencies
        run: npm ci
      
      # Playwright ya viene en node_modules desde npm ci
      # No necesitamos instalar browsers porque solo empaquetamos (no ejecutamos)
      
      - name: Prepare Playwright for build
        run: npm run prepare-playwright
      
      - name: Run quality checks
        run: npm run validate
      
      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
      
      - name: Verify Playwright before packaging
        run: |
          echo "✅ Verificando que Playwright esté en node_modules..."
          if [ -d "node_modules/playwright" ]; then
            echo "✅ Playwright encontrado"
            ls -la node_modules/playwright/ | head -20
          else
            echo "❌ ERROR: Playwright no está en node_modules"
            exit 1
          fi
      
      - name: Package application (Windows)
        run: npm run make:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # Verificar que node_modules/playwright quedó desempaquetado
      - name: Verify packaged Playwright (asarUnpack)
        run: |
          echo "📦 Verificando recursos empaquetados (electron-forge)..."
          
          if [ -d "out/replicon-automator-win32-x64/resources" ]; then
            echo "✅ Carpeta resources encontrada"
            ls -lah out/replicon-automator-win32-x64/resources/
            
            if [ -d "out/replicon-automator-win32-x64/resources/app.asar.unpacked" ]; then
              echo ""
              echo "✅ app.asar.unpacked encontrado"
              
              if [ -d "out/replicon-automator-win32-x64/resources/app.asar.unpacked/node_modules/playwright" ]; then
                echo "✅ Playwright desempaquetado correctamente"
                echo ""
                echo "📂 Buscando chrome.exe:"
                find out/replicon-automator-win32-x64/resources/app.asar.unpacked/node_modules/playwright -name "chrome.exe" -type f || echo "⚠️  chrome.exe no encontrado (se descargará al ejecutar)"
              else
                echo "❌ ERROR: node_modules/playwright NO encontrado en app.asar.unpacked"
                ls -lah out/replicon-automator-win32-x64/resources/app.asar.unpacked/node_modules/ || echo "node_modules no existe"
                exit 1
              fi
            else
              echo "❌ ERROR: app.asar.unpacked NO encontrado en resources"
              echo "Contenido de resources:"
              ls -lah out/replicon-automator-win32-x64/resources/
              exit 1
            fi
          else
            echo "❌ ERROR: Carpeta resources no encontrada"
            echo "Contenido de out/:"
            ls -lah out/
            exit 1
          fi
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            out/make/squirrel.windows/x64/*.exe
            out/make/squirrel.windows/x64/*.nupkg
            out/make/squirrel.windows/x64/RELEASES
            out/make/zip/win32/x64/*.zip
            release_notes.txt
          retention-days: 1  # Eliminar después de 1 día para $0 storage

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
      
      - name: List downloaded files
        run: |
          echo "=== Downloaded files ==="
          ls -lah
          find . -type f
      
      - name: Read release notes
        id: notes
        run: |
          if [ -f release_notes.txt ]; then
            {
              echo 'notes<<EOF'
              cat release_notes.txt
              echo EOF
            } >> $GITHUB_OUTPUT
          else
            echo "notes=Release v${{ needs.build.outputs.version }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Replicon Automator v${{ needs.build.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: false
          files: |
            *.exe
            *.nupkg
            *.zip
            RELEASES
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
