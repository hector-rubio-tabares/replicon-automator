name: CI/CD Pipeline

on:
  push:
    tags: ['v*']        # Solo en tags de release
  pull_request:
    branches: [main]    # Solo PRs a main
  workflow_dispatch:    # Ejecución manual

# Cancelar builds duplicados
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22.14.0'

jobs:
  build:
    name: Build & Quality Check
    runs-on: windows-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" =~ refs/tags/v(.+) ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Extract release notes from CHANGELOG
        id: changelog
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          awk -v ver="$VERSION" '/^## \[/{if(p){exit}; if($0 ~ "## \\[" ver "\\]"){p=1; next}} p' CHANGELOG.md > release_notes.txt
          if [ ! -s release_notes.txt ]; then
            echo "Release v$VERSION" > release_notes.txt
          fi
          echo "Release notes extracted:"
          cat release_notes.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # Cache node_modules para ahorrar ~2 minutos
      - name: Cache node modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-node-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-v2-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      # Crear .env.production para el build (gitignored)
      - name: Create production env file
        shell: bash
        run: |
          cat > .env.production << 'EOF'
          VITE_APP_NAME=Replicon Automator
          VITE_LOG_LEVEL=warn
          VITE_ENABLE_DEVTOOLS=false
          REPLICON_LOGIN_URL=https://flyr.okta.com/app/UserHome?type_hint=ACTIVATION&session_hint=AUTHENTICATED
          REPLICON_TIMEOUT=45000
          REPLICON_HEADLESS=true
          REPLICON_AUTOSAVE=true
          EOF

      # Instalar Chromium de Playwright (Windows - para tests y empaquetado)
      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run quality checks
        run: npm run validate

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Verify Playwright before packaging
        shell: bash
        run: |
          echo "Verificando que Playwright esté en node_modules..."
          if [ -d "node_modules/playwright" ]; then
            echo "OK: Playwright encontrado"
          else
            echo "ERROR: Playwright no está en node_modules"
            exit 1
          fi
          echo "Verificando playwright-bin generado..."
          if [ -d "playwright-bin" ]; then
            echo "OK: playwright-bin encontrado"
            ls -la playwright-bin/
          else
            echo "WARN: playwright-bin no encontrado (se usará asarUnpack)"
          fi

      - name: Package application (Windows)
        run: npx electron-builder --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Verify build output
        shell: bash
        run: |
          echo "=== Release directory ==="
          ls -lah release/ || { echo "ERROR: release/ not found"; exit 1; }
          echo ""
          echo "=== Checking expected files ==="
          MISSING=0
          for file in "Replicon.Automator.Setup.exe" "Replicon.Automator.Portable.exe" "latest.yml" "Replicon.Automator.Setup.exe.blockmap"; do
            if [ -f "release/$file" ]; then
              SIZE=$(wc -c < "release/$file" 2>/dev/null || echo "?")
              echo "OK: $file ($SIZE bytes)"
            else
              echo "MISSING: $file"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo ""
            echo "WARNING: $MISSING expected file(s) missing"
            echo "All files in release/:"
            ls -la release/
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            release/*.exe
            release/*.blockmap
            release/*.yml
            release_notes.txt
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installer

      - name: List downloaded files
        run: |
          echo "=== Downloaded files ==="
          find . -type f -ls

      - name: Read release notes
        id: notes
        run: |
          if [ -f release_notes.txt ]; then
            {
              echo 'notes<<EOF'
              cat release_notes.txt
              echo EOF
            } >> $GITHUB_OUTPUT
          else
            echo "notes=Release v${{ needs.build.outputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Replicon Automator v${{ needs.build.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: false
          files: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
